name: Cortex CLI - Container Image Scan Demo

on:
  workflow_dispatch: # Allows you to trigger the demo manually from the UI
  push:
    branches: [ main ]

jobs:
  cortex-cwp-scan:
    name: Run Cloud Workload Protection Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Strict requirement for Cortex CLI CWP/Image scans
      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      # Install Cortex CLI via Homebrew
      - name: Install Cortex CLI
        run: |
          brew tap paloaltonetworks/cortexcli
          brew install cortexcli
          cortexcli --version

      # Build the local Dockerfile we just created
      - name: Build Local Demo Image
        run: |
          docker build -t my-local-app:latest .

      # Run the Cortex Image Scan on the freshly built image
      env:
        CORTEX_API_BASE_URL: ${{ secrets.CORTEX_API_BASE_URL }}
        CORTEX_API_KEY_ID: ${{ secrets.CORTEX_API_KEY_ID }}
        CORTEX_API_KEY: ${{ secrets.CORTEX_API_KEY }}
      run: |
        echo "Starting CWP Container Image Scan..."
        cortexcli image scan my-local-app:latest --soft-fail